version: '3.8'

services:
  aura-focus:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - aura-focus-data:/app/data
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/aura_focus.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  aura-focus-data:
    driver: local
