apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aura-focus-network-policy
  namespace: aura-focus
  labels:
    app: aura-focus
spec:
  podSelector:
    matchLabels:
      app: aura-focus
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
