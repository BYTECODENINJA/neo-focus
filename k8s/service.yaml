apiVersion: v1
kind: Service
metadata:
  name: aura-focus-service
  namespace: aura-focus
  labels:
    app: aura-focus
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: aura-focus
  sessionAffinity: None
