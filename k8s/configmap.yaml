apiVersion: v1
kind: ConfigMap
metadata:
  name: aura-focus-config
  namespace: aura-focus
  labels:
    app: aura-focus
data:
  NODE_ENV: "production"
  PORT: "3000"
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: "sqlite:///app/data/aura-focus.db"
  BACKUP_ENABLED: "true"
  BACKUP_SCHEDULE: "0 2 * * *"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  HEALTH_CHECK_ENABLED: "true"
