apiVersion: v1
kind: PersistentVolume
metadata:
  name: aura-focus-pv
  labels:
    app: aura-focus
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath:
    path: /data/aura-focus
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aura-focus-pvc
  namespace: aura-focus
  labels:
    app: aura-focus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
