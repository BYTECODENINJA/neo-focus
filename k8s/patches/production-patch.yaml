apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-focus
  namespace: aura-focus
spec:
  replicas: 3
  template:
    spec:
      containers:
      - name: aura-focus
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "warn"
        - name: METRICS_ENABLED
          value: "true"
